version: "3.8"

services:
  # ========== Qdrant 向量数据库 ==========
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiservice-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    networks:
      - aiservice-net

  # ========== RAG 应用服务 ==========
  rag-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aiservice-rag
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - EMBEDDING_MODEL=BAAI/bge-large-zh-v1.5
      - LLM_API_BASE=${LLM_API_BASE:-https://api.deepseek.com/v1}
      - LLM_API_KEY=${LLM_API_KEY:-sk-d05b323874a8497b91360a8a68ae42b7}
      - LLM_MODEL=${LLM_MODEL:-deepseek-chat}
    volumes:
      - ./data:/app/data
      - huggingface_cache:/root/.cache/huggingface
    networks:
      - aiservice-net
    command: >
      sh -c "python -m backend.main"

networks:
  aiservice-net:
    driver: bridge

volumes:
  qdrant_data:
  huggingface_cache: